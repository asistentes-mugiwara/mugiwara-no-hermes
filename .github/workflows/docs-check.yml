name: docs-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic repository checks
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CHANGELOG.md
          test -f public-assets/diagrams/hermes-mugiwara-system-map.svg
          test -f docs/overview.md
          test -f docs/architecture.md
          test -f docs/crew-roster.md
          test -f docs/stack-and-credits.md
          test -f docs/deployment-status.md
          test -f docs/operations-safeguards.md
          test -f docs/system-vs-showcase.md
          test -f docs/publishing-policy.md
          test -f docs/release-policy.md
          test -f docs/autonomy-model.md
          test -f docs/configuration-model.md
          test -f docs/workflow-model.md
